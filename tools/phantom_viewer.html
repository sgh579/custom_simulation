<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Phantom 3D Viewer</title>
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #111315;
      color: #f5f5f2;
      font: 14px/1.4 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    #viewport {
      position: fixed;
      inset: 0;
    }

    .bar {
      position: fixed;
      top: 12px;
      left: 12px;
      right: 12px;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 8px 10px;
      background: rgba(17, 19, 21, 0.72);
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 8px;
      backdrop-filter: blur(8px);
    }

    .title {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: #f1f1ed;
      font-weight: 600;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 0 0 auto;
    }

    label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #e2e0d8;
      user-select: none;
    }

    button {
      border: 1px solid rgba(255, 255, 255, 0.28);
      border-radius: 6px;
      background: #f4f0e8;
      color: #17191b;
      padding: 5px 9px;
      font: inherit;
      cursor: pointer;
    }

    button:hover {
      background: #ffffff;
    }

    .status {
      position: fixed;
      left: 12px;
      bottom: 12px;
      z-index: 2;
      max-width: min(680px, calc(100vw - 24px));
      padding: 7px 9px;
      background: rgba(17, 19, 21, 0.72);
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 8px;
      color: #d9d7cf;
      backdrop-filter: blur(8px);
    }

    @media (max-width: 640px) {
      .bar {
        align-items: stretch;
        flex-direction: column;
      }

      .controls {
        justify-content: space-between;
      }
    }
  </style>
</head>
<body>
  <canvas id="viewport"></canvas>
  <div class="bar">
    <div id="title" class="title">phantom</div>
    <div class="controls">
      <label><input id="tissueToggle" type="checkbox" checked> tissue</label>
      <label><input id="axesToggle" type="checkbox" checked> axes</label>
      <button id="resetButton" type="button">Reset</button>
    </div>
  </div>
  <div id="status" class="status">Loading...</div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.165.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.165.0/examples/jsm/"
      }
    }
  </script>
  <script type="module">
    import * as THREE from "three";
    import { OrbitControls } from "three/addons/controls/OrbitControls.js";
    import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";

    const canvas = document.getElementById("viewport");
    const status = document.getElementById("status");
    const title = document.getElementById("title");
    const tissueToggle = document.getElementById("tissueToggle");
    const axesToggle = document.getElementById("axesToggle");
    const resetButton = document.getElementById("resetButton");
    const params = new URLSearchParams(window.location.search);
    const modelUrl = params.get("model") || "sample_0000_phantom.gltf";

    title.textContent = modelUrl.split("/").pop() || "phantom";

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x111315);

    const camera = new THREE.PerspectiveCamera(48, window.innerWidth / window.innerHeight, 0.001, 20);
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;

    scene.add(new THREE.HemisphereLight(0xffffff, 0x5e6870, 2.0));
    const keyLight = new THREE.DirectionalLight(0xffffff, 2.8);
    keyLight.position.set(0.35, -0.45, 0.75);
    scene.add(keyLight);

    const axes = new THREE.AxesHelper(0.12);
    scene.add(axes);
    const grid = new THREE.GridHelper(0.24, 12, 0x5a6168, 0x30363b);
    grid.rotation.x = Math.PI / 2;
    scene.add(grid);

    let modelRoot = null;
    let tissueMeshes = [];

    const loader = new GLTFLoader();
    loader.load(
      modelUrl,
      (gltf) => {
        modelRoot = gltf.scene;
        scene.add(modelRoot);
        tissueMeshes = [];
        modelRoot.traverse((object) => {
          if (!object.isMesh) {
            return;
          }
          object.material = object.material.clone();
          object.material.depthWrite = object.material.opacity >= 1.0;
          object.material.side = THREE.DoubleSide;
          if ((object.name || "").toLowerCase().includes("normal_tissue")) {
            tissueMeshes.push(object);
          }
        });
        fitCameraToObject(modelRoot);
        status.textContent = `Loaded ${title.textContent}`;
      },
      undefined,
      (error) => {
        console.error(error);
        status.textContent = `Could not load ${modelUrl}`;
      }
    );

    tissueToggle.addEventListener("change", () => {
      for (const mesh of tissueMeshes) {
        mesh.visible = tissueToggle.checked;
      }
    });

    axesToggle.addEventListener("change", () => {
      axes.visible = axesToggle.checked;
      grid.visible = axesToggle.checked;
    });

    resetButton.addEventListener("click", () => {
      if (modelRoot) {
        fitCameraToObject(modelRoot);
      }
    });

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function fitCameraToObject(object) {
      const box = new THREE.Box3().setFromObject(object);
      const center = box.getCenter(new THREE.Vector3());
      const size = box.getSize(new THREE.Vector3());
      const radius = Math.max(size.x, size.y, size.z, 0.01);
      camera.position.set(center.x + radius * 1.2, center.y - radius * 1.7, center.z + radius * 1.1);
      camera.near = Math.max(radius / 1000, 0.0001);
      camera.far = radius * 100;
      camera.updateProjectionMatrix();
      controls.target.copy(center);
      controls.update();
    }

    function animate() {
      controls.update();
      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }

    animate();
  </script>
</body>
</html>
